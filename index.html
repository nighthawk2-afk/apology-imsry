<script>
  let yesCount = 0;

  const yesErrors = [
    '🤨 bro. BRO. click the yellow button.',
    '🛑 wrong choice. try again.',
    '🤡 you are doing this on purpose now',
    '😭 i am BEGGING you. the yellow one.',
    '💀 please. just click no.',
    '🙃 last chance... click no.',
  ];

  function clickYes() {
    yesCount++;

    const err = document.getElementById('err1');
    err.innerHTML = yesErrors[Math.min(yesCount-1, yesErrors.length-1)];
    err.classList.remove('show');
    void err.offsetWidth;
    err.classList.add('show');

    // After 5-6 attempts → go to "I respect it"
    if (yesCount >= 6) {
      go('s-yes');
      prog(33);
    }
  }

  function clickNo() {
    // IMMEDIATELY go to final screen
    go('s-end');
    prog(100);
    confetti();
  }

  function goApology() { go('s-apology'); prog(66); }

  function notYet(btn) {
    // optional: you can keep or remove this logic
    const err = document.getElementById('err2');
    err.innerHTML = "😐 forgiveness required. click the blue button.";
    err.classList.remove('show');
    void err.offsetWidth;
    err.classList.add('show');
  }

  function allGood() {
    go('s-end'); 
    prog(100);
    confetti();
  }

  function go(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function prog(pct) {
    document.getElementById('prog').style.width = pct + '%';
    document.getElementById('prog').style.background = pct === 100 ? '#4ecb71' : '#ffd93d';
  }

  function confetti() {
    const shapes = ['🎉','🎊','✨','🥳','😎','🙌','🎈'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      el.style.fontSize = (16 + Math.random()*20) + 'px';
      el.style.left = (Math.random()*100) + 'vw';
      el.style.top = '-30px';
      el.style.animationDelay = (Math.random()*1.8) + 's';
      el.style.animationDuration = (2 + Math.random()*2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
  }
</script>
